<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:p="http://primefaces.org/ui"
	xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0"
		charset="UTF-8" />
	<title>Bericht schreiben</title>
	<!-- Einbinden des externen Stylesheets -->
	<link rel="stylesheet"
		href="#{request.contextPath}/dynamic-style.css?vereinnr=#{historienBean.vereinnr}"
		type="text/css" />
	<h:outputStylesheet library="css" name="styles.css" />
	<!-- Einbinden des externen Skripts -->
	<h:outputScript library="js" name="script.js" target="head" />
</h:head>

<h:body>
	<div class="header-area">
		<h2>Historische zustände Widerherstellen</h2>
		<p:link value="Spielbericht ansehen" target="_blank"
			href="#{historienBean.ergebnisLink}"
			rendered="#{not empty historienBean.ergebnisLink and historienBean.ergebnisLink.startsWith('http')}" />

		<h3>
			<h:outputText value="#{historienBean.liga}" />
			<h:outputText value=": " />
			<h:outputText value="#{historienBean.heim}" />
			<h:outputText value=" - " />
			<h:outputText value="#{historienBean.gast}" />
			<h:outputText value=" (" />
			<h:outputText value="#{historienBean.datum}" />
			<h:outputText value=") " />
			<h:outputText value="#{historienBean.ergebnis}" />
		</h3>
	</div>

	<h:panelGroup id="textPanel" rendered="#{historienBean.inBearbeitung}">
		<div class="responsive-container">
			<div class="red-container">
				<div class="text-input">
					<h:outputText
						value="Achtung: Bericht wird möglicherweise gerade von jemand Bearbeitet. Bitte das Log überprüfen und ggf. ein paar Minuten warten. " />
				</div>
			</div>
		</div>
	</h:panelGroup>

	<h:form id="aktuellerForm" enctype="multipart/form-data">
		<div class="responsive-container">
			<div class="text-input">
				<div style="text-align: center;">
					<h2>Aktueller Stand</h2>
				</div>
				<div class="text-container">
					<h:panelGroup
						rendered="#{not empty historienBean.ergebnisLink and historienBean.ergebnisLink.startsWith('http')}">
						<h3>
							<h:outputText value="#{historienBean.heim}" />
							<h:outputText value=" - " />
							<h:outputText value="#{historienBean.gast}" />
							<h:outputText value="    " />
							<h:outputText value="#{historienBean.ergebnis}" />
						</h3>
					</h:panelGroup>

					<!-- Eingabefeld, wenn obige Bedingung NICHT zutrifft -->
					<h:panelGroup
						rendered="#{empty historienBean.ergebnisLink or not historienBean.ergebnisLink.startsWith('http')}">
						<h:outputText value="#{historienBean.aktuelleUeberschrift}"
							style="font-size: 1.5em;">>
							</h:outputText>
					</h:panelGroup>
					<h:outputText value="#{historienBean.aktuellerBerichtText}"
						style="width: 100%; box-sizing: border-box; white-space: pre-line;"
						escape="false" />
					<!-- Optional: Anzeige der Spielergebnisse -->
					<h:outputText value="#{historienBean.spielErgebnis}" escape="false"
						style="display: block; width: 100%;" />
					<h:panelGroup
						rendered="#{not empty historienBean.aktuellesBildUrl}">
						<h:graphicImage value="#{historienBean.aktuellesBildUrl}"
							width="300" />
					</h:panelGroup>
					<h:panelGroup rendered="#{empty historienBean.aktuellesBildUrl}">
						<h:graphicImage library="images" name="keinBild.png" width="300" />
					</h:panelGroup>
					<h:outputText id="aktuellesBildUnterschrift"
						value="#{historienBean.aktuellesBildUnterschrift}"
						styleClass="kleinText" />

				</div>
			</div>
			<!-- Rechter Bereich: Fehleranzeige und Button "Rechtschreibung prüfen" -->
			<div class="error-table">
				<div style="text-align: center;">
					<h2 style="display: inline-block; margin-right: 10px;">Historischer
						Stand vom:</h2>
					<p:selectOneMenu value="#{historienBean.ausgewaehlterTimestamp}"
						style="display: inline-block;">
						<p:ajax event="change" process="@this"
							listener="#{historienBean.onTimestampChanged}" update="@form" />
						<f:selectItem itemLabel="Timestamp auswählen"
							itemValue="#{historienBean.ausgewaehlterTimestamp}"
							noSelectionOption="false" />
						<f:selectItems value="#{historienBean.historienTimestamps}" />
					</p:selectOneMenu>
				</div>
				<div class="text-container">
					<h:panelGroup
						rendered="#{not empty historienBean.ergebnisLink and historienBean.ergebnisLink.startsWith('http')}">
						<h3>
							<h:outputText value="#{historienBean.heim}" />
							<h:outputText value=" - " />
							<h:outputText value="#{historienBean.gast}" />
							<h:outputText value="    " />
							<h:outputText value="#{historienBean.ergebnis}" />
						</h3>
					</h:panelGroup>

					<!-- Eingabefeld, wenn obige Bedingung NICHT zutrifft -->
					<div class="hover-container">
						<h:panelGroup
							rendered="#{empty historienBean.ergebnisLink or not historienBean.ergebnisLink.startsWith('http')}">
							<h:outputText value="#{historienBean.historieUeberschrift}"
								style="font-size: 1.5em;">>
							</h:outputText>
						</h:panelGroup>
						<p:commandButton value="Bericht übernehmen"
							action="#{historienBean.uebernahmeUeberschrift}" update="@form"
							title="Klicken zum Übernehmen" />
					</div>
					<div class="hover-container">
						<h:outputText value="#{historienBean.historieBerichtText}"
							escape="false" style="white-space: pre-line;" />
						<br /> <br />
						<h:outputText value="#{historienBean.spielErgebnis}"
							escape="false" />
						<p:commandButton value="Bericht übernehmen"
							action="#{historienBean.uebernahmeText}" update="@form"
							title="Klicken zum Übernehmen" />
					</div>
					<h:panelGroup
						rendered="#{historienBean != null and not empty
							historienBean.historieBildUrl}">
						<div class="hover-container">
							<h:graphicImage value="#{historienBean.historieBildUrl}"
								width="300" />

							<p:commandButton value="'Bild übernehmen"
								action="#{historienBean.uebernahmeBild}" update="@form"
								title="Klicken zum Übernehmen" />
						</div>
					</h:panelGroup>
					<h:panelGroup rendered="#{empty historienBean.historieBildUrl}">
						<div class="hover-container">
							<h:graphicImage library="images" name="keinBild.png" width="300" />
							<p:commandButton value="'Bild übernehmen"
								action="#{historienBean.uebernahmeBild}" update="@form"
								title="Klicken zum Übernehmen" />
						</div>
					</h:panelGroup>
					<div class="hover-container">
						<h:outputText id="historieBildUnterschrift"
							value="#{historienBean.historieBildUnterschrift}"
							styleClass="kleinText" />
						<p:commandButton value="'Bildunterschrift übernehmen"
							action="#{historienBean.uebernahmeBildUnterschrift}"
							update="@form" title="Klicken zum Übernehmen" />
					</div>
				</div>
			</div>
		</div>
		<div class="button-container">
			<p:commandButton value="Speichern" action="bericht.xhtml"
				actionListener="#{historienBean.speichern}">
				<f:param name="vereinnr" value="#{historienBean.vereinnr}" />
				<f:param name="heim" value="#{historienBean.heim}" />
				<f:param name="gast" value="#{historienBean.gast}" />
				<f:param name="datum" value="#{historienBean.datum}" />
				<f:param name="ergebnis" value="#{historienBean.ergebnis}" />
				<f:param name="ergebnisLink" value="#{historienBean.ergebnisLink}" />
				<f:param name="uuid" value="#{historienBean.uuid}" />
				<f:param name="liga" value="#{historienBean.liga}" />
				<f:param name="ligaSpiel" value="#{historienBean.ligaSpiel}" />					
				<f:param name="gruppeUrl" value="#{historienBean.gruppeUrl}" />
			</p:commandButton>
			<!-- Zurück-Button -->
			<p:commandButton value="Zurück" action="bericht.xhtml"
				actionListener="#{historienBean.zurueck}" immediate="true">
				<f:param name="vereinnr" value="#{historienBean.vereinnr}" />
				<f:param name="heim" value="#{historienBean.heim}" />
				<f:param name="gast" value="#{historienBean.gast}" />
				<f:param name="datum" value="#{historienBean.datum}" />
				<f:param name="ergebnis" value="#{historienBean.ergebnis}" />
				<f:param name="ergebnisLink" value="#{historienBean.ergebnisLink}" />
				<f:param name="uuid" value="#{historienBean.uuid}" />
				<f:param name="liga" value="#{historienBean.liga}" />
				<f:param name="ligaSpiel" value="#{historienBean.ligaSpiel}" />							
				<f:param name="gruppeUrl" value="#{historienBean.gruppeUrl}" />				
			</p:commandButton>
		</div>
	</h:form>

	<br />
	<h:form>
		<h:panelGroup id="logPanel"
			rendered="#{not empty historienBean.logEntries}">
			<p:panel header="Änderungshistorie" toggleable="true"
				collapsed="true" widgetVar="logPanelWidget">
				<p:dataTable id="logTable" value="#{historienBean.logEntries}"
					var="log" rowKey="#{log.ergebnisLink}-#{log.timestamp.time}">
					<p:column headerText="Datum">
						<h:outputText value="#{log.timestamp}">
							<f:convertDateTime pattern="yyyy-MM-dd HH:mm:ss" />
						</h:outputText>
					</p:column>
					<p:column headerText="Name">
						<h:outputText value="#{log.name}" />
					</p:column>
					<p:column headerText="Aktion">
						<h:outputText value="#{log.mail}" />
					</p:column>
					<p:column headerText="Mailversand erfolgreich">
						<h:outputText value="#{log.mailErfolgreich}" />
					</p:column>
					<p:column headerText="Info">
						<h:outputText value="#{log.info}" />
					</p:column>
					<p:rowExpansion>
						<h:panelGrid columns="1">
							<h:outputText value="ErgebnisLink: #{log.ergebnisLink}" />
						</h:panelGrid>
					</p:rowExpansion>
				</p:dataTable>
			</p:panel>
		</h:panelGroup>

		<!-- Polling zur UI-Aktualisierung -->
		<p:poll interval="5" listener="#{historienBean.updBearbeitung}" />
	</h:form>
</h:body>
</html>
