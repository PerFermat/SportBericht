<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:p="http://primefaces.org/ui"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0"
		charset="UTF-8" />
	<title>Datei-Upload</title>
	<link rel="stylesheet"
		href="#{request.contextPath}/dynamic-style.css?vereinnr=#{ftpBean.vereinnr}"
		type="text/css" />
	<h:outputStylesheet name="css/styles.css" />
	<style>
.ki-output table {
	width: 100%;
	border-collapse: collapse;
	margin-bottom: 14px;
}

.ki-output th, .ki-output td {
	border: 1px solid #d0d7de;
	padding: 8px;
	vertical-align: top;
}

.ki-output th {
	background: #f5f7fa;
}

.ftp-split-scroll {
	display: flex;
	flex-direction: column;
	align-items: stretch;
}

@media ( min-width : 920px) {
	.ftp-split-scroll {
		flex-direction: row;
		height: calc(100vh - 85px);
	}
	.ftp-split-scroll>.text-input, .ftp-split-scroll>.error-table {
		flex: 1 1 0;
		min-width: 0;
		min-height: 0;
		overflow-y: auto;
	}
}
#{
ftpBean







.parserAusgabeCss








}
</style>
</h:head>

<h:body>
	<div class="tabheader-area">
		<h:outputLink value="#{ftpBean.vereinHomepage}" target="_blank">
			<img src="#{ftpBean.bestimmenIcon}" style="vertical-align: middle;"
				width="50" />
		</h:outputLink>
		<h:form>
			<p:commandButton type="button" value="Handbuch"
				onclick="window.open('https://tt-hattenhofen.de/anwenderhandbuch-berichtssystem-tischtennis/', '_blank');" />
		</h:form>
		<h2>Datei-Upload – #{ftpBean.verein}</h2>
		<h:form>
			<p:commandButton value="Zurück" action="#{ftpBean.ruecksprung}"
				immediate="true" rendered="#{not empty ftpBean.ruecksprung}">
				<f:param name="vereinnr" value="#{ftpBean.vereinnr}" />
			</p:commandButton>
		</h:form>
	</div>
	<div class="responsive-container ftp-split-scroll">
		<div class="text-input">
			<h:form id="ftpForm" enctype="multipart/form-data">
				<p:messages id="messages" showDetail="true" closable="true" />

				<p:panel header="Datei übertragen">
					<h:panelGrid columns="2" style="width:100%; row-gap: 10px;"
						columnClasses="ui-g-4,ui-g-8">
						<h:outputLabel for="thema" value="Thema" />
						<p:selectOneMenu id="thema" value="#{ftpBean.ausgewaehltesThema}"
							style="width:100%;">
							<f:selectItems value="#{ftpBean.themaOptionen}" />
							<p:ajax process="@this" update="ftpForm" />
						</p:selectOneMenu>

						<h:outputLabel for="datei" value="Datei" />
						<p:fileUpload id="datei" mode="simple" auto="true"
							multiple="false" skinSimple="true" label="Datei auswählen"
							listener="#{ftpBean.dateiAusgewaehlt}"
							update="messages ausgabeTabs ftpForm" />
						<h:outputLabel for="dateiname" value="Ausgewählt "
							rendered="#{not empty ftpBean.ausgewaehlterDateiname}" />
						<h:outputText id="dateiname"
							value="#{ftpBean.ausgewaehlterDateiname}"
							rendered="#{not empty ftpBean.ausgewaehlterDateiname}" />
					</h:panelGrid>

					<div
						style="margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;">
						<p:commandButton value="Analyse" action="#{ftpBean.analysierePdf}"
							update="messages ausgabeTabs"
							rendered="#{ftpBean.hallenThemaAusgewaehlt}" />
						<p:commandButton value="Hochladen" action="#{ftpBean.hochladen}"
							update="ftpForm"
							rendered="#{not ftpBean.hallenThemaAusgewaehlt and ftpBean.adminFreigabe}" />
					</div>
					<div class="text-input">
						<div class="text-container">
							<p:tabView id="ausgabeTabs">
								<p:tab title="E-Mail schreiben"
									rendered="#{ftpBean.hallenThemaAusgewaehlt}">
									<div
										style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 12px;">
										<p:commandButton value="E-Mail senden"
											action="#{ftpBean.sendeTerminMail}" update="ftpForm" />
										<p:commandButton value="KI-Analyse hinzufügen"
											action="#{ftpBean.kiAnalyse}" update="ftpForm" />
										<p:commandButton value="Hochladen"
											action="#{ftpBean.hochladen}" update="ftpForm"
											rendered="#{ftpBean.adminFreigabe}" />
									</div>
									<p:inputTextarea value="#{ftpBean.emailFreitext}" rows="3"
										style="width:100%; margin-bottom: 12px;"
										placeholder="Freitext..." />
									<ui:repeat value="#{ftpBean.parserTerminStatusListe}"
										var="parserTermin">
										<div class="termin-row"
											style="display: flex; gap: 12px; margin-bottom: 10px; align-items: center;">


											<!-- Rechte Seite: Text -->
											<div style="flex: 1;">
												<h:outputText value="#{parserTermin.htmlTextAnzeige}"
													escape="false" />
											</div>
											<!-- Linke Seite: Dropdown -->
											<div style="min-width: 200px;">
												<p:selectOneMenu value="#{parserTermin.status}"
													styleClass="status-select" style="width:100%;">
													<f:selectItems value="#{ftpBean.terminStatusOptionen}" />
												</p:selectOneMenu>
											</div>

										</div>
									</ui:repeat>
									<ui:repeat value="#{ftpBean.manuelleTage}" var="tag">
										<div style="display: flex; gap: 8px; margin-bottom: 8px;">
											<p:selectOneMenu value="#{tag.tag}" style="width:25%;">
												<f:selectItems value="#{ftpBean.ueberschrift}" var="u"
													itemLabel="#{u}" itemValue="#{u}" />
											</p:selectOneMenu>
											<p:inputText value="#{tag.text}" placeholder="Freitext"
												style="width:75%;" />
											<p:commandButton value="Hinzufügen"
												action="#{ftpBean.neuerTagHinzufuegen}" update="ftpForm"
												style="margin-bottom: 8px;" />
										</div>
									</ui:repeat>
									<p:commandButton value="Neuer Tag" action="#{ftpBean.neuerTag}"
										update="ftpForm" style="margin-bottom: 8px;" />
									<div class="ki-output" style="margin-top: 12px;">
										<p:outputLabel value="#{ftpBean.kiAusgabeText}" escape="false" />
									</div>
								</p:tab>
								<p:tab title="Original PDF">
									<iframe src="#{ftpBean.originalPdfUrl}" width="100%"
										height="800" frameborder="0">
										<p>Ihr Browser unterstützt keine Iframes.</p>
									</iframe>
								</p:tab>
							</p:tabView>
						</div>
					</div>
				</p:panel>
			</h:form>
		</div>
		<!-- Rechter Bereich: Fehleranzeige und Button "Rechtschreibung prüfen" -->
		<div class="error-table">
			<h:panelGroup id="terminPanel">
				<p:outputPanel id="iframePanel">
					<h:panelGroup>
						<iframe src="#{ftpBean.htmlSeite}" width="100%" height="1300"
							frameborder="0">
							<p>Ihr Browser unterstützt keine Iframes.</p>
						</iframe>
					</h:panelGroup>
				</p:outputPanel>
			</h:panelGroup>
		</div>
	</div>
</h:body>
</html>
