<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:p="http://primefaces.org/ui"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:c="http://java.sun.com/jsp/jstl/core">
<h:head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0"
		charset="UTF-8" />
	<base href="/" />
	<title>Kommentare</title>
	<!-- Favicon hinzufügen -->
	<link rel="icon" href="images/Favicon_Kommentar.ico"
		type="image/x-icon" />
	<link rel="stylesheet"
		href="#{request.contextPath}/dynamic-style.css?vereinnr=#{kommentarBean.vereinnr}"
		type="text/css" />
	<h:outputStylesheet name="css/styles.css" />
	<h:outputScript name="js/script.js" />
</h:head>

<h:body>
	<h:form>
		<div class="tabheader-area">
			<h:outputLink value="#{kommentarBean.vereinHomepage}" target="_blank">
				<img src="#{kommentarBean.bestimmenIcon}"
					style="vertical-align: middle;" width="50" />
			</h:outputLink>
			<h2>Freigabe von Kommentare</h2>
			<p:commandButton value="Zurück" action="index.xhtml" immediate="true">
				<f:param name="vereinnr" value="#{kommentarBean.vereinnr}" />
			</p:commandButton>
		</div>
	</h:form>
	<br />
	<div class="responsive-container">
		<div class="text-input">
			<h:form id="myForm">
				<p:panelGrid columns="2" layout="grid" style="margin: 0 auto;"
					columnClasses="labelColumn,valueColumn">

					<h:outputLabel for="site" value="Homepage:" />
					<p:selectOneMenu id="site" value="#{kommentarBean.name}"
						style="width: 100%">
						<p:ajax event="change" process="@this" update="urlForm" />
						<f:selectItem itemLabel="Homepage auswählen"
							noSelectionOption="true" />
						<f:selectItems value="#{kommentarBean.homepages}" />
					</p:selectOneMenu>

					<h:outputLabel for="user" value="Benutzername:" />
					<h:inputText id="user" value="#{kommentarBean.username}"
						style="width: 100%" />

					<h:outputLabel for="pwd" value="Passwort:" />
					<h:inputSecret id="pwd" value="#{kommentarBean.passwort}"
						style="width: 100%" />


				</p:panelGrid>
				<!-- Leerzelle für Ausrichtung -->
				<h:outputText value="" />
				<p:commandButton value="Kommentare abrufen"
					action="#{kommentarBean.loadComments}"
					update="mainForm commentsPanel :growl" process="@form"
					style="width: 100%" />
			</h:form>

			<h:form id="mainForm">
				<div class="text-container">
					<!-- Hauptinhalt: Zwei Spalten -->
					<h:panelGroup layout="block"
						style="display: flex; gap: 20px; margin-top: 30px;">

						<!-- Linke Seite: Kommentare -->
						<h:panelGroup id="commentsPanel" style="flex: 1;"
							styleClass="bericht-repeat">
							<p:tabView dynamic="false">

								<p:tab title="Wartend  (#{kommentarBean.holdCount})">
									<ui:repeat value="#{kommentarBean.holdComments}" var="cmt">
										<p:panel header="#{cmt.authorName} (#{cmt.date})"
											toggleable="true" collapsed="false">
											<h:outputText value="#{cmt.content}" escape="false" />
											<br />
											<br />
											<div class="button4-container button-container-panel-bg">
												<p:commandButton value="Freigeben"
													action="#{kommentarBean.approveComment(cmt)}"
													update="mainForm commentsPanel  :growl" />
												<p:commandButton value="In Spam verschieben"
													action="#{kommentarBean.markAsSpam(cmt)}"
													update="mainForm commentsPanel  :growl"
													style="margin-left:10px" />
												<p:commandButton value="Papierkorb verschieben"
													action="#{kommentarBean.trashComment(cmt)}"
													update="mainForm commentsPanel  :growl" />
												<p:commandButton value="Beitrag anzeigen"
													action="#{kommentarBean.showPost(cmt.postId)}"
													update="urlForm:webPreview  :growl"
													style="margin-left:10px" />
											</div>
										</p:panel>
									</ui:repeat>
								</p:tab>


								<p:tab title="Genehmigt (#{kommentarBean.approvedCount})">
									<ui:repeat value="#{kommentarBean.approvedComments}" var="cmt">
										<p:panel header="#{cmt.authorName} (#{cmt.date})"
											toggleable="true" collapsed="true">
											<h:outputText value="#{cmt.content}" escape="false" />
											<br />
											<br />
											<div class="button4-container button-container-panel-bg">
												<p:commandButton value="In Spam verschieben"
													action="#{kommentarBean.markAsSpam(cmt)}"
													update="mainForm commentsPanel  :growl"
													style="margin-left:10px" />
												<p:commandButton value="Papierkorb verschieben"
													action="#{kommentarBean.trashComment(cmt)}"
													update="mainForm commentsPanel  :growl" />
												<p:commandButton value="Beitrag anzeigen"
													action="#{kommentarBean.showPost(cmt.postId)}"
													update="urlForm:webPreview  :growl"
													style="margin-left:10px" />
											</div>
										</p:panel>
									</ui:repeat>
								</p:tab>

								<p:tab title="Spam (#{kommentarBean.spamCount})">
									<ui:repeat value="#{kommentarBean.spamComments}" var="cmt">
										<p:panel header="#{cmt.authorName} (#{cmt.date})"
											toggleable="true" collapsed="true">
											<h:outputText value="#{cmt.content}" escape="false" />
											<br />
											<br />
											<div class="button4-container button-container-panel-bg">
												<p:commandButton value="Freigeben"
													action="#{kommentarBean.approveComment(cmt)}"
													update="mainForm commentsPanel  :growl" />
												<p:commandButton value="Papierkorb verschieben"
													action="#{kommentarBean.trashComment(cmt)}"
													update="mainForm commentsPanel  :growl" />
												<p:commandButton value="Beitrag anzeigen"
													action="#{kommentarBean.showPost(cmt.postId)}"
													update="urlForm:webPreview  :growl"
													style="margin-left:10px" />
											</div>
										</p:panel>
									</ui:repeat>
								</p:tab>

								<p:tab title="Papierkorb (#{kommentarBean.trashCount})">
									<ui:repeat value="#{kommentarBean.trashComments}" var="cmt">
										<p:panel header="#{cmt.authorName} (#{cmt.date})"
											toggleable="true" collapsed="true">
											<h:outputText value="#{cmt.content}" escape="false" />
											<br />
											<br />
											<div class="button4-container button-container-panel-bg">
												<p:commandButton value="Freigeben"
													action="#{kommentarBean.approveComment(cmt)}"
													update="mainForm commentsPanel  :growl" />
												<p:commandButton value="Beitrag anzeigen"
													action="#{kommentarBean.showPost(cmt.postId)}"
													update="urlForm:webPreview :growl" style="margin-left:10px" />
											</div>
										</p:panel>
									</ui:repeat>
								</p:tab>
							</p:tabView>
						</h:panelGroup>
					</h:panelGroup>
				</div>
			</h:form>
		</div>
		<div class="error-table">
			<h:form id="urlForm">
				<!-- Rechte Seite: Webseiten-Vorschau -->
				<h:panelGroup id="webPreview" style="flex: 0;">
					<iframe src="#{kommentarBean.selectedPostUrl}" width="100%"
						height="4500px" />
				</h:panelGroup>
			</h:form>
		</div>
	</div>
	<h:form prependId="false">
		<p:growl id="growl" showDetail="true" life="6000" />
	</h:form>
</h:body>
</html>
