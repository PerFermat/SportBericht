<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:p="http://primefaces.org/ui"
	xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0" charset="UTF-8" />
	<base href="/" />
	<title>SpielCode Parser – #{spielCodeParserBean.verein}</title>
	<link rel="stylesheet"
		href="#{request.contextPath}/dynamic-style.css?vereinnr=#{spielCodeParserBean.vereinnr}"
		type="text/css" />
	<h:outputStylesheet name="css/styles.css" />
</h:head>
<h:body>
	<div class="tabheader-area">
		<h2>SpielCode Parser – #{spielCodeParserBean.verein}</h2>
	</div>

	<div class="tabellen-container">
		<h:form enctype="multipart/form-data">
			<p:growl id="growl" showDetail="true" />

			<p:panel header="Import aus PDF">
				<p:panelGrid columns="2" layout="grid" styleClass="ui-fluid">
					<p:outputLabel for="pdf" value="PDF-Datei" />
					<p:fileUpload id="pdf" value="#{spielCodeParserBean.pdfDatei}" mode="simple"
						skinSimple="true" accept="application/pdf" />

					<p:outputLabel for="mannschaft" value="Mannschaft" />
					<p:autoComplete id="mannschaft" value="#{spielCodeParserBean.mannschaft}"
						completeMethod="#{spielCodeParserBean.completeMannschaft}"
						dropdown="true" forceSelection="false" />

					<p:outputLabel for="liga" value="Liga" />
					<p:autoComplete id="liga" value="#{spielCodeParserBean.liga}"
						completeMethod="#{spielCodeParserBean.completeLiga}"
						dropdown="true" forceSelection="false" />

					<p:outputLabel for="typ" value="Typ" />
					<p:selectOneMenu id="typ" value="#{spielCodeParserBean.typ}">
						<f:selectItem itemLabel="Bitte wählen" itemValue="" noSelectionOption="true" />
						<f:selectItem itemLabel="Pin" itemValue="Pin" />
						<f:selectItem itemLabel="Spielcode" itemValue="Spielcode" />
					</p:selectOneMenu>
				</p:panelGrid>

				<p:commandButton value="PDF vorbereiten" actionListener="#{spielCodeParserBean.vorbereiten}"
					update="growl previewPanel" ajax="false" style="margin-top:10px" />
				<p:commandButton value="Importieren" actionListener="#{spielCodeParserBean.importieren}"
					update="growl" ajax="false" style="margin-top:10px; margin-left:10px" />
			</p:panel>

			<p:outputPanel id="previewPanel" style="margin-top:12px;">
				<h:panelGroup rendered="#{not empty spielCodeParserBean.pdfPreviewUrl}">
					<object data="#{spielCodeParserBean.pdfPreviewUrl}" type="application/pdf"
						width="100%" height="600px">
						PDF-Vorschau kann nicht angezeigt werden.
					</object>
				</h:panelGroup>
			</p:outputPanel>
		</h:form>
	</div>
</h:body>
</html>
