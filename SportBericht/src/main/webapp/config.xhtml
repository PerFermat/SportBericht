<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0"
		charset="UTF-8" />
	<title>Konfiguration</title>
	<link rel="stylesheet"
		href="#{request.contextPath}/dynamic-style.css?vereinnr=#{configBean.vereinnr}"
		type="text/css" />
	<h:outputStylesheet library="css" name="styles.css" />
	<h:outputScript library="js" name="script.js" target="head" />
</h:head>

<h:body>
	<div class="tabheader-area">
		<h:outputLink value="#{configBean.vereinHomepage}" target="_blank">
			<img src="#{configBean.bestimmenIcon}"
				style="vertical-align: middle;" width="50" />
		</h:outputLink>
		<h:form>
			<p:commandButton type="button" value="Handbuch"
				onclick="window.open('https://tt-hattenhofen.de/anwenderhandbuch-berichtssystem-tischtennis/', '_blank');" />
		</h:form>
		<h2>Programmkonfiguration – #{configBean.verein}</h2>
		<h:form>
			<p:commandButton value="Zurück" action="liga.xhtml" immediate="true"
				rendered="#{configBean.tennis}">
				<f:param name="vereinnr" value="#{configBean.vereinnr}" />
			</p:commandButton>
			<p:commandButton value="Zurück" action="spielplan.xhtml"
				immediate="true" rendered="#{configBean.tischtennis}">
				<f:param name="vereinnr" value="#{configBean.vereinnr}" />
			</p:commandButton>
		</h:form>
	</div>
	<h:form style="text-align: center;">
		<h2>Config-Einstellungen</h2>
	</h:form>
	<h:form id="otpConfigForm"
		style="max-width: 700px; margin: 0 auto 15px auto;">
		<p:messages id="otpMessages" showDetail="true" closable="true" />
		<p:panel header="Sicherheitsfreigabe"
			rendered="#{not configBean.einmalpasswortGeprueft}">
			<h:panelGrid columns="2" style="width:100%; row-gap:10px;"
				columnClasses="ui-g-4,ui-g-8">
				<h:outputLabel for="otpInput" value="Einmalpasswort" />
				<p:inputText id="otpInput"
					value="#{configBean.einmalpasswortEingabe}" autocomplete="off" />
			</h:panelGrid>
			<div style="margin-top: 10px;">
				<p:commandButton value="Einmalpasswort anfordern"
					actionListener="#{configBean.anfordernEinmalpasswort}"
					update="otpConfigForm" />
				<p:spacer width="10" />
				<p:commandButton value="Einmalpasswort prüfen"
					actionListener="#{configBean.pruefeEinmalpasswort}"
					update="otpConfigForm configTabelle" />
			</div>
		</p:panel>
	</h:form>
	<h:form id="configTabelle" style="max-width: 1500px; margin: 0 auto;">
		<p:panel header="Konfiguration"
			rendered="#{configBean.einmalpasswortGeprueft}">
			<h:panelGrid columns="4" style="width:100%; margin-bottom:10px;">
				<h:outputLabel for="suchfeld" value="Suche:" />
				<p:inputText id="suchfeld" value="#{configBean.suchText}"
					style="width:100%;">
					<p:ajax event="keyup" update="configTable" />
				</p:inputText>
				<h:outputLabel for="kategorie" value="Kategorie:" />
				<p:selectOneMenu id="kategorie"
					value="#{configBean.ausgewaehlteKategorie}" style="width:100%;">
					<f:selectItem itemLabel="Alle" itemValue="" />
					<f:selectItems value="#{configBean.verfuegbareKategorien}" />
					<p:ajax event="change" update="configTable" />
				</p:selectOneMenu>
			</h:panelGrid>

			<p:dataTable id="configTable"
				value="#{configBean.gefilterteConfigEintraege}" var="eintrag"
				editable="true" styleClass="config-table" style="width: 100%">

				<p:column headerText="Key" style="width: 30%;">
					<h:panelGroup layout="block">
						<p:commandButton icon="pi pi-pencil" title="Bearbeiten"
							styleClass="p-button-rounded p-button-text p-button-sm"
							actionListener="#{configBean.openBearbeitenDialog(eintrag)}"
							process="@this" immediate="true" update=":configDialogForm"
							oncomplete="PF('configDialog').show();" />
						<h:outputText value="#{eintrag.eintrag}"
							style="font-weight: bold;" />
						<h:outputText value="#{eintrag.bedeutung}"
							style="display:block; font-size: 0.8rem; color: #666; margin-top: 4px;" />
					</h:panelGroup>
				</p:column>
				<p:column headerText="" style="width: 55px; text-align:center;">
					<p:commandButton id="saveBtn_#{configTable.rowIndex}"
						icon="pi pi-save" title="Diesen Eintrag speichern"
						rendered="#{configBean.eintragGeaendert(eintrag)}"
						actionListener="#{configBean.speichereEintrag(eintrag)}"
						process="@this" immediate="true"
						update=":configTabelle:configTable"
						styleClass="p-button-rounded p-button-text p-button-sm" />
				</p:column>

				<p:column headerText="Wert">
					<ui:fragment rendered="#{configBean.farbFeld(eintrag)}">
						<h:panelGrid columns="3" cellpadding="5"
							style="border: 0; border-collapse: collapse;">
							<h:inputText id="hueInput_#{configTable.rowIndex}"
								value="#{eintrag.wert}" size="4"
								style="border: 0; outline: none;">
								<p:ajax event="change" update="configTable" process="@this" />
							</h:inputText>

							<p:slider for="hueInput_#{configTable.rowIndex}" minValue="0"
								maxValue="360" step="1" style="border: 0;"
								onSlide="updatePreview('previewBox_#{configTable.rowIndex}', ui.value)">
								<p:ajax event="slideEnd"
									process="hueInput_#{configTable.rowIndex}" update="configTable" />
							</p:slider>
							<h:panelGroup layout="block"
								style="width: 50px; height: 30px; border: 0; background-color: hsl(#{empty eintrag.wert ? 0 : eintrag.wert}, 90%, 50%);"
								styleClass="previewBox_#{configTable.rowIndex}" />


						</h:panelGrid>
					</ui:fragment>
					<ui:fragment
						rendered="#{eintrag.inhaltformatZahl and not configBean.farbFeld(eintrag)}">
						<h:panelGrid columns="2" cellpadding="5"
							style="border: 0; border-collapse: collapse; width:100%;">
							<p:inputText id="zahlInput_#{configTable.rowIndex}"
								value="#{eintrag.wert}" style="width:100%;">
								<p:ajax event="change" update="configTable" process="@this" />
							</p:inputText>
							<p:slider for="zahlInput_#{configTable.rowIndex}"
								minValue="#{configBean.minWert(eintrag)}"
								maxValue="#{configBean.maxWert(eintrag)}"
								step="#{configBean.schrittweite(eintrag)}">
								<p:ajax event="slideEnd"
									process="zahlInput_#{configTable.rowIndex}"
									update="configTable" />
							</p:slider>
						</h:panelGrid>
					</ui:fragment>
					<ui:fragment rendered="#{eintrag.inhaltformatEnum}">
						<p:selectOneMenu value="#{eintrag.wert}" style="width:100%;">
							<f:selectItems value="#{configBean.enumWerte(eintrag)}" />
							<p:ajax event="change" update="configTable" process="@this" />
						</p:selectOneMenu>
					</ui:fragment>
					<ui:fragment rendered="#{eintrag.inhaltformatChatGpt}">
						<p:selectOneMenu value="#{eintrag.wert}" style="width:100%;">
							<f:selectItems value="#{configBean.chatGptModelle}" />
							<p:ajax event="change" update="configTable" process="@this" />
						</p:selectOneMenu>
					</ui:fragment>
					<ui:fragment rendered="#{eintrag.inhaltformatPasswort}">
						<p:commandButton value="Passwort eingeben"
							actionListener="#{configBean.openPasswortDialog(eintrag)}"
							process="@this" immediate="true" update=":passwortDialogForm"
							oncomplete="PF('passwortDialog').show();" />
					</ui:fragment>
					<ui:fragment rendered="#{configBean.textFeld(eintrag)}">
						<p:inputTextarea value="#{eintrag.wert}" rows="2"
							autoResize="true" style="width: 100%;">
							<p:ajax event="change" update="configTable" process="@this" />
						</p:inputTextarea>
					</ui:fragment>
				</p:column>


			</p:dataTable>

			<div class="button4-container">
				<p:commandButton value="Neuer Key"
					actionListener="#{configBean.openNeuerKeyDialog}" process="@this"
					immediate="true" update=":configDialogForm"
					oncomplete="PF('configDialog').show();" />
				<p:commandButton value="Aktuallisieren Homepage-Configs-Einträge"
					action="#{configBean.insertHomepage}" update="configTable" />

				<p:commandButton value="Konfiguration der iFrames-Internetseiten" action="configHtml.xhtml"
					immediate="true" rendered="#{configBean.tischtennis}">
					<f:param name="vereinnr" value="#{configBean.vereinnr}" />
					<f:param name="p" value="#{configBean.passwort}" />
				</p:commandButton>
			</div>

		</p:panel>
	</h:form>
	<p:dialog widgetVar="configDialog" modal="true" resizable="false"
		header="#{configBean.neuerDialog ? 'Neuer Key' : 'Key bearbeiten'}"
		width="700">
		<h:form id="configDialogForm">
			<h:panelGrid columns="2" columnClasses="ui-g-3,ui-g-9"
				style="width:100%; row-gap:8px;">
				<h:outputLabel for="dialogKey" value="Key" />
				<ui:fragment rendered="#{configBean.neuerDialog}">
					<p:inputText id="dialogKeyNeu" value="#{configBean.dialogKey}"
						style="width:100%;" />
				</ui:fragment>
				<ui:fragment rendered="#{not configBean.neuerDialog}">
					<p:inputText id="dialogKey" value="#{configBean.dialogKey}"
						style="width:100%;" readonly="true" />
				</ui:fragment>

				<h:outputLabel for="dialogBedeutung" value="Bedeutung" />
				<p:inputTextarea id="dialogBedeutung"
					value="#{configBean.dialogBedeutung}" rows="2" autoResize="true"
					style="width:100%;" />

				<h:outputLabel for="dialogInhaltformat" value="Inhaltformat" />
				<p:selectOneMenu id="dialogInhaltformat"
					value="#{configBean.dialogInhaltformat}" style="width:100%;">
					<f:selectItem itemLabel="Bitte wählen" itemValue="" />
					<f:selectItems value="#{configBean.verfuegbareInhaltformate}" />
				</p:selectOneMenu>

				<h:outputLabel for="dialogWertebereich" value="Wertebereich" />
				<p:inputText id="dialogWertebereich"
					value="#{configBean.dialogWertebereich}" style="width:100%;" />
			</h:panelGrid>

			<h3>Kategorien</h3>
			<ui:repeat value="#{configBean.dialogKategorien}" var="kategorie"
				varStatus="status">
				<h:panelGrid columns="2" style="width:100%; margin-bottom:6px;"
					columnClasses="ui-g-1,ui-g-11">
					<ui:fragment
						rendered="#{not empty configBean.dialogKategorien[status.index]}">
						<p:commandButton icon="pi pi-trash"
							actionListener="#{configBean.removeKategorieZeile(status.index)}"
							update="configDialogForm"
							styleClass="p-button-rounded p-button-text p-button-danger"
							title="Kategorie löschen" />
					</ui:fragment>
					<ui:fragment
						rendered="#{empty configBean.dialogKategorien[status.index]}">
						<h:panelGroup />
					</ui:fragment>
					<p:selectOneMenu
						value="#{configBean.dialogKategorien[status.index]}"
						style="width:100%;" editable="true">
						<f:selectItem itemLabel="Vorhandene wählen" itemValue="" />
						<f:selectItems value="#{configBean.verfuegbareKategorien}" />
					</p:selectOneMenu>
				</h:panelGrid>
			</ui:repeat>
			<p:commandButton value="+ Kategorie"
				actionListener="#{configBean.addKategorieZeile}"
				update="configDialogForm" styleClass="p-button-text" />

			<div style="margin-top: 15px; text-align: right;">
				<p:commandButton value="Speichern"
					action="#{configBean.speichereDialog}"
					update=":configTabelle:configTable configDialogForm"
					oncomplete="PF('configDialog').hide();" />
			</div>
		</h:form>
	</p:dialog>
	<p:dialog widgetVar="passwortDialog" modal="true" resizable="false"
		header="Passwort bearbeiten" width="500">
		<h:form id="passwortDialogForm">
			<h:panelGrid columns="2" style="width:100%; row-gap:8px;"
				columnClasses="ui-g-4,ui-g-8">
				<h:outputLabel for="passwortInput" value="Passwort" />
				<p:password id="passwortInput"
					value="#{configBean.passwortDialogInput}" feedback="false"
					style="width:100%;" redisplay="true" />
			</h:panelGrid>
			<div style="margin-top: 15px; text-align: right;">
				<p:commandButton value="Speichern"
					action="#{configBean.speicherePasswortDialog}"
					update=":configTabelle:configTable passwortDialogForm"
					oncomplete="PF('passwortDialog').hide();" />
			</div>
		</h:form>
	</p:dialog>
</h:body>
</html>
